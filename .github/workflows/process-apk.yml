name: Native ARM64 APK Processing

on:
  release:
    types: [published] # リリースが公開されたら自動起動
  workflow_dispatch:   # 手動起動も可能にする

jobs:
  analyze_and_build:
    runs-on: ubuntu-24.04-arm # ここが最大のポイントだ！
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils unzip emscripten make
          # Emscriptenの環境設定が必要な場合はここで調整する

      - name: Download Artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p assets
          
          # タグの指定は前回成功した "$LATEST_TAG" でOKだ
          # -v を削除して実行する！
          gh release download "$LATEST_TAG" --pattern "*" --dir ./assets/ --clobber
          
          echo "--- Downloaded files ---"
          ls -lh assets/

      - name: Install Dependencies & Download Tool
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils unzip openjdk-17-jre-headless
          
          # 隊員が発見した正確な座標を使用する！
          APKEDITOR_URL="https://github.com/REAndroid/APKEditor/releases/download/V1.4.9/APKEditor-1.4.9.jar"
          
          echo "Procuring APKEditor from: $APKEDITOR_URL"
          curl -f -L "$APKEDITOR_URL" -o APKEditor.jar
          
          # ファイル確認
          if [ -s APKEditor.jar ]; then
            echo "Successfully procured APKEditor.jar"
            ls -lh APKEditor.jar
          else
            echo "::error:: Failed to download APKEditor.jar!"
            exit 1
          fi

      - name: Extract and Analyze .so (Debug Mode)
        run: |
          mkdir -p extracted
          touch analysis_report.txt  # 最初に空ファイルを作成しておく
          THRESHOLD=102400
          
          echo "--- Current directory contents ---"
          ls -R assets/ || echo "Warning: assets/ directory not found!"
          
          # assets 配下の全ファイルを処理
          for file in assets/*; do
            [ -f "$file" ] || continue
            
            file_size=$(wc -c < "$file")
            echo "Checking: $file (Size: $file_size bytes)"
            
            # サイズチェック
            if [ "$file_size" -lt "$THRESHOLD" ]; then
              echo "  -> Skipped (Too small)"
              continue
            fi
            
            echo "  -> Processing!"
            base_name=$(basename "$file")
            target_apk="$file"
            
            # .apks マージ処理
            if [[ "$base_name" == *.apks ]]; then
              echo "  -> Merging APKS..."
              java -jar APKEditor.jar m -i "$file" -o "merged_$base_name.apk"
              target_apk="merged_$base_name.apk"
            fi
            
            target_dir="extracted/$base_name"
            mkdir -p "$target_dir"
            
            echo "  -> Unzipping $target_apk..."
            unzip -q "$target_apk" -d "$target_dir"
            
            echo "  -> Searching for .so files..."
            find "$target_dir" -name "*.so" -exec nm -D {} \; >> analysis_report.txt 2>/dev/null
            
            echo "--- Completed: $base_name ---"
          done
          
          echo "--- Final Artifact Check ---"
          ls -l analysis_report.txt
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action [XML-Integrator-Bot]"
          git add .
          git commit "aa" || true
          git push || true
      

      - name: Upload Analysis Result
        uses: actions/upload-artifact@v4
        with:
          name: native-analysis-report
          path: analysis_report.txt

      # 今後、ここに WASM 変換用の make コマンドを追加していく
      # - name: Build WASM
      #   run: emcc src/game_logic.c -o build/game.wasm
