name: Native ARM64 APK Processing

on:
  release:
    types: [published] # リリースが公開されたら自動起動
  workflow_dispatch:   # 手動起動も可能にする

jobs:
  analyze_and_build:
    runs-on: ubuntu-24.04-arm # ここが最大のポイントだ！
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils unzip emscripten make
          # Emscriptenの環境設定が必要な場合はここで調整する

      - name: Download APK from Latest Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p assets
          # リリースのタグを取得してAPKを回収
          LATEST_TAG=$(gh release view --json tagName -q .tagName)
          echo "Downloading from tag: $LATEST_TAG"
          gh release download "$LATEST_TAG" --pattern "*.apk" --dir ./assets/
          ls -lh assets/

      - name: Install Dependencies & Java
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils unzip openjdk-17-jre-headless
          # APKEditor.jar を取得（GitHub Release等から持ってくる想定）
          # 必要に応じて適宜 URL を修正してくれ
          curl -L "https://github.com/REAndroid/APKEditor/releases/latest/download/APKEditor.jar" -o APKEditor.jar

      - name: Extract and Analyze .so
        run: |
          mkdir -p extracted
          THRESHOLD=102400
          
          for file in assets/*; do
            [ -f "$file" ] || continue
            file_size=$(wc -c < "$file")
            [ "$file_size" -lt "$THRESHOLD" ] && continue
            
            base_name=$(basename "$file")
            target_apk="$file"

            # もし .apks ならマージして .apk に変換
            if [[ "$base_name" == *.apks ]]; then
              echo ">> Merging APKS: $base_name"
              java -jar APKEditor.jar m -i "$file" -o "merged_$base_name.apk"
              target_apk="merged_$base_name.apk"
              base_name="merged_$base_name.apk"
            fi
            
            echo "--- Processing: $base_name ---"
            target_dir="extracted/$base_name"
            mkdir -p "$target_dir"
            
            # 結合された（または元々の）APKを解凍
            unzip -q "$target_apk" -d "$target_dir" || echo "Warning: Failed to unzip $target_apk"
            
            echo ">> Analyzing symbols in $base_name" >> analysis_report.txt
            find "$target_dir" -name "*.so" -exec nm -D {} \; >> analysis_report.txt 2>/dev/null
            
            echo "--- Completed: $base_name ---"
          done

      - name: Upload Analysis Result
        uses: actions/upload-artifact@v4
        with:
          name: native-analysis-report
          path: analysis_report.txt

      # 今後、ここに WASM 変換用の make コマンドを追加していく
