name: Native ARM64 APK Processing

on:
  release:
    types: [published] # リリースが公開されたら自動起動
  workflow_dispatch:   # 手動起動も可能にする

jobs:
  analyze_and_build:
    runs-on: ubuntu-24.04-arm # ここが最大のポイントだ！
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils unzip emscripten make
          # Emscriptenの環境設定が必要な場合はここで調整する

      - name: Download APK from Latest Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p assets
          # リリースのタグを取得してAPKを回収
          LATEST_TAG=$(gh release view --json tagName -q .tagName)
          echo "Downloading from tag: $LATEST_TAG"
          gh release download "$LATEST_TAG" --pattern "*.apk" --dir ./assets/
          ls -lh assets/

      - name: Extract and Analyze .so
        run: |
          mkdir -p extracted
          
          # assets 配下の全ファイルをループ処理する
          for file in assets/*; do
            # ファイルかチェック
            [ -f "$file" ] || continue
            
            # ファイル名を取得
            base_name=$(basename "$file")
            echo "--- Processing: $base_name ---"
            
            # 衝突を防ぐために、ファイル名ごとの専用ディレクトリを作成
            target_dir="extracted/$base_name"
            mkdir -p "$target_dir"
            
            # unzip で解凍（-q でログを静かにする）
            # .apks は内部的にZIPなので unzip でそのまま解凍可能だ
            unzip -q "$file" -d "$target_dir" || echo "Warning: Failed to unzip $file, skipping..."
            
            # 解析実行：そのディレクトリ内の .so だけを nm にかける
            echo ">> Analyzing symbols in $base_name" >> analysis_report.txt
            find "$target_dir" -name "*.so" -exec nm -D {} \; >> analysis_report.txt 2>/dev/null
            
            echo "--- Completed: $base_name ---"
          done

      - name: Upload Analysis Result
        uses: actions/upload-artifact@v4
        with:
          name: native-analysis-report
          path: analysis_report.txt

      # 今後、ここに WASM 変換用の make コマンドを追加していく
