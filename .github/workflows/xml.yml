name: Generate Web Xml

on:
  workflow_dispatch:
# --- ここを追加 ---
permissions:
  contents: write
# ------------------

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v4

      - name: 権限の付与とスクリプト実行
        run: |
          chmod +x manifest.sh
          ./manifest.sh
          bash xml.sh

      - name: 生成結果の確認
        run: |
          # 全ての manifest.json を探し出して中身を表示する
          find . -name "manifest.json" -exec echo "--- File: {} ---" \; -exec cat {} \; 

      - name: 変更のコミットとプッシュ（オプション）
        # 必要であれば、生成されたjsonを自動でコミットしてリポジトリに保存する場合
        run: |
          git config --global user.name "Gemini-Bot"
          git config --global user.email "bot@example.com"
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update manifest.json [skip ci]" && git push)
