name: Gemini Programming Team - Release & Manual APK XML Integrator

# 🔥 【ここが隊員の指定ポイント！】
# リリースの作成・編集、または画面からのボタンポチ（手動）で起動するハイブリッド仕様だ！
on:
  release:
    types: [published, edited]
  workflow_dispatch: # これを入れるだけで、GitHub上に「ボタンポチ」の起動ボタンが出現するぞ！

jobs:
  integrate-xml:
    runs-on: ubuntu-latest

    steps:
    # 1. 基地（リポジトリ）のソースコードを展開
    - name: 🛰️ [ACTION] 基地のコードを展開中...
      uses: actions/checkout@v4

    # 2. 戦闘力最大化！高バージョンJava環境を構築
    - name: ☕ [VALUE_CHANGE] 高バージョンJava環境 (Oracle JDK 21) をインジェクション！
      uses: actions/setup-java@v4
      with:
        distribution: 'oracle'
        java-version: '21'

    # 3. Javaの起動チェック
    - name: 🔍 [SYSTEM] Javaバージョンを徹底チェック
      run: |
        java -version
        echo "[VALUE_CHANGE] 高火力Javaエンジンの正常起動を確認しました。"

    # 4. APKEditor.jar の爆速調達
    - name: 🛠️ [SYSTEM] APKEditor.jar をダウンロード
      run: |
        mkdir -p bin
        curl -L -o bin/APKEditor.jar https://github.com/REAndroid/APKEditor/releases/latest/download/APKEditor.jar
        echo "[VALUE_CHANGE] bin/APKEditor.jar の配備完了。"

    # 5. 【新兵器】リリースに添付されたAPK/APKSを全自動でぶっこ抜く！
    - name: 📥 [ACTION] リソース全取得（リリースアセットのダウンロード）
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        echo "[SYSTEM] リリースに添付されたバイナリの探索を開始します。"
        mkdir -p apk_download
        
        # GitHub CLI (gh) を使って、最新のリリースアセットをフォルダーに一括ダウンロード！
        # これにより20MB超えの巨大ファイルもGitHubサーバー間で安全に高速転送されるぞ！
        gh release download ${{ github.event.release.tag_name || 'latest' }} --pattern "*.apk" --dir apk_download || true
        gh release download ${{ github.event.release.tag_name || 'latest' }} --pattern "*.apks" --dir apk_download || true
        
        # ダウンロードされたファイルの存在チェック
        TARGET_FILE=$(ls apk_download/*.apk apk_download/*.apks 2>/dev/null | head -n 1)
        
        if [ -z "$TARGET_FILE" ]; then
          echo "[ERROR] 警告：対象の .apk または .apks ファイルが見つかりません！"
          echo "[SYSTEM] 手動ボタンポチの場合は、最新のリリースに対象ファイルがあるか確認してください。"
          exit 1
        fi
        
        echo "[VALUE_CHANGE] ターゲットアセットの確保に成功：$TARGET_FILE"
        echo "TARGET_PATH=$TARGET_FILE" >> $GITHUB_ENV

    # 6. APKEditorのD・Mコマンドを最適化実行
    - name: 🚀 [ACTION] APKEditorによる逆コンパイル（XMLテキスト化）
      run: |
        TARGET_FILE="${{ env.TARGET_PATH }}"
        
        # APKS（分割型）ならMコマンドで単一APKに結合
        if [[ "$TARGET_FILE" == *.apks ]]; then
          echo "[VALUE_CHANGE] APKSを検知。マージ作戦（M）を始動します！"
          java -jar bin/APKEditor.jar m -i "$TARGET_FILE" -o apk_download/merged_output.apk
          TARGET_FILE="apk_download/merged_output.apk"
          echo "[SYSTEM] マージ完了。単一APKを生成しました。"
        fi
        
        # DコマンドでバイナリXMLを完全テキスト化
        echo "[VALUE_CHANGE] 高バージョンJavaパワーで逆コンパイル（D）を実行！"
        java -jar bin/APKEditor.jar d -i "$TARGET_FILE" -o out_decompiled
        echo "[SYSTEM] すべてのバイナリXMLがプレインテキストに復元されました。"

    # 7. 全XMLの1ファイル一括統合処理（余計なことはしない隊員指定のピュア仕様）
    - name: 📂 [VALUE_CHANGE] 全XMLファイルを1つに結合・ガッチャンコ
      run: |
        echo "[ACTION] 展開された全XMLを1本の統合ファイルにまとめます。"
        mkdir -p web_output
        
        # 統合ファイルのスタートタグ
        echo "<integrated_apk_data>" > web_output/all_in_one.xml
        
        # AndroidManifest.xmlの取り込み
        if [ -f out_decompiled/AndroidManifest.xml ]; then
          echo "  <manifest_file>" >> web_output/all_in_one.xml
          grep -v "<?xml" out_decompiled/AndroidManifest.xml >> web_output/all_in_one.xml
          echo "  </manifest_file>" >> web_output/all_in_one.xml
        fi
        
        # res/layout 配下のUI構成XMLをすべて検索して全取得・結合
        find out_decompiled/res/layout/ -name "*.xml" 2>/dev/null | while read -r xml_file; do
          FILE_NAME=$(basename "$xml_file" .xml)
          echo "  <layout_file name=\"$FILE_NAME\">" >> web_output/all_in_one.xml
          grep -v "<?xml" "$xml_file" >> web_output/all_in_one.xml
          echo "  </layout_file>" >> web_output/all_in_one.xml
        done
        
        # 統合ファイルのエンドタグ
        echo "</integrated_apk_data>" >> web_output/all_in_one.xml
        echo "[VALUE_CHANGE] web_output/all_in_one.xml への一括統合が完全に完了しました！"

    # 8. 生成された統合XML（all_in_one.xml）をGitHubリポジトリにプッシュ
    - name: 🛰️ [SYSTEM] 統合XMLを基地（リポジトリ）へ自動コミット
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action [XML-Integrator-Bot]"
        git add web_output/all_in_one.xml
        git commit -m "VALUE_CHANGE: リリースアセットからXML一括統合完了 [skip ci]" || echo "変更なし"
        git push
        echo "[SYSTEM] 作戦大成功！これにてiPad Safariからの迎撃準備が整ったぞ！"
