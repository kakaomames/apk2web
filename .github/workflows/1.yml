name: APK2Web Pipeline

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  # 1. マージ部隊：APKSを1つのAPKに統合して保存
  merge-apk:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      
      # 1. 原料（.apks）をダウンロード
      - name: Download .apks from Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p assets
          # 最新のリリースタグから .apks を取得
          gh release download "$LATEST_TAG" --pattern "*.apks" --dir ./assets/ --clobber

      # 2. マージ実行（APKEditor）
      - name: Setup & Merge
        run: |
          # ツール準備
          curl -f -L "https://github.com/REAndroid/APKEditor/releases/download/V1.4.9/APKEditor-1.4.9.jar" -o APKEditor.jar
          mkdir -p output
          
          # マージ実行
          for file in assets/*.apks; do
             [ -e "$file" ] || continue
             echo ">> Merging $file ..."
             java -jar APKEditor.jar m -i "$file" -o "output/merged_$(basename "$file" .apks).apk"
          done
          
          # デバッグ：本当にファイルができたか確認！
          ls -lh output/

      # 3. 完成品（.apk）を次の部隊へ転送
      - name: Upload Merged APK
        uses: actions/upload-artifact@v4
        with:
          name: merged-apk
          path: output/*.apk

  # 2. Native部隊：ライブラリ解析（WASM変換の下準備）
  analyze-native:
    needs: merge-apk
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: merged-apk
      - name: Analyze .so files
        run: |
          mkdir -p extracted
          for apk in *.apk; do
            unzip -q "$apk" -d "extracted/$apk"
            echo "--- Report for $apk ---" >> native_report.txt
            find "extracted/$apk" -name "*.so" | while read -r so; do
              echo "FILE: $so" >> native_report.txt
              nm -D "$so" >> native_report.txt 2>/dev/null
            done
          done
      - uses: actions/upload-artifact@v4
        with:
          name: native-report
          path: native_report.txt

  # 3. Resource部隊：XML -> HTML/CSS (抽出)
  extract-resources:
    needs: merge-apk
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: merged-apk
      # 💡 ここが重要！JARがないなら、その場で調達する！
      - name: Prepare APKEditor
        run: |
          curl -f -L "https://github.com/REAndroid/APKEditor/releases/download/V1.4.9/APKEditor-1.4.9.jar" -o APKEditor.jar
          
      - name: Extract Resources with APKEditor
        run: |
          # APKEditor.jar は既にダウンロード済みとするか、再度取得する
          # merged_*.apk に対して d コマンドを実行
          for apk in merged_*.apk; do
            [ -e "$apk" ] || continue
            echo ">> Decoding $apk with APKEditor..."
            java -jar APKEditor.jar d -i "$apk" -o "decoded_$(basename "$apk" .apk)"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: resources
          path: decoded_*

  # 4. Logic部隊：DEX -> JS (解析)
  decompile-logic:
    needs: merge-apk
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: merged-apk
      - name: Decompile DEX
        run: |
          # 簡易的にdexdump等で解析、またはJADXを使用
          echo "Starting logic analysis..." > logic_report.txt
          # ここに解析コマンドを順次追加
      - uses: actions/upload-artifact@v4
        with:
          name: logic-report
          path: logic_report.txt

  # 5. 集約部隊：結果をリポジトリに同期
  sync-to-repo:
    needs: [analyze-native, extract-resources, decompile-logic]
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
      - name: Commit Reports
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action [XML-Integrator-Bot]"
          cp */*.txt . || true
          git add *.txt
          git commit -m "Update Analysis Reports" || true
          git push || true
