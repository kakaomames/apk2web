name: APK2Web Pipeline

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  # 1. 掃除部隊
  # 1. 掃除部隊
  cleanup-artifacts:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Purge Old Artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo ">> Starting cleanup..."
          # 明示的にリポジトリを指定する方法でも回避可能だが、
          # checkoutがあれば標準の記法で動作する
          ARTIFACTS=$(gh api repos/${{ github.repository }}/actions/artifacts -q '.artifacts[].id')
          for id in $ARTIFACTS; do
            echo "Deleting artifact $id..."
            gh api repos/${{ github.repository }}/actions/artifacts/$id -X DELETE
          done
          echo ">> Cleanup complete!"

  # 2. マージ部隊
  merge-apk:
    needs: cleanup-artifacts
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download .apks from Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p assets
          gh release download --pattern "*.apks" --dir ./assets/ --clobber
      - name: Setup & Merge
        run: |
          curl -f -L "https://github.com/REAndroid/APKEditor/releases/download/V1.4.9/APKEditor-1.4.9.jar" -o APKEditor.jar
          mkdir -p output
          targets=("com.mojang.minecraftpe_1.26.23.1.apks" "pokemon.apks")
          for target in "${targets[@]}"; do
            file="assets/$target"
            if [ -f "$file" ]; then
              echo ">> Target acquired: $file. Merging..."
              java -jar APKEditor.jar m -i "$file" -o "output/merged_$(basename "$file" .apks).apk"
            fi
          done
      - uses: actions/upload-artifact@v4
        with:
          name: merged-apk
          path: output/*.apk
          retention-days: 1

  # 3. Native部隊
  # 3. Native部隊
  analyze-native:
    needs: merge-apk
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: merged-apk
      - name: Analyze .so files
        run: |
          mkdir -p native-report
          # output/ フォルダの中を確認するよう修正！
          for apk in output/*.apk; do
            [ -e "$apk" ] || continue
            # 展開先も output/extracted/ にする
            mkdir -p "extracted"
            unzip -q "$apk" -d "extracted/$(basename "$apk")"
            echo "--- Report for $apk ---" >> native-report/native_report.txt
            find "extracted/$(basename "$apk")" -name "*.so" | while read -r so; do
              echo "FILE: $so" >> native-report/native_report.txt
              nm -D "$so" >> native-report/native_report.txt 2>/dev/null
            done
          done
      - uses: actions/upload-artifact@v4
        with:
          name: native-report
          path: native-report/
          retention-days: 1

  # 4. Resource部隊
  extract-resources:
    needs: merge-apk
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: merged-apk
      - name: Prepare APKEditor
        run: |
          curl -f -L "https://github.com/REAndroid/APKEditor/releases/download/V1.4.9/APKEditor-1.4.9.jar" -o APKEditor.jar
      - name: Extract & Index
        run: |
          mkdir -p decoded
          for apk in merged_*.apk; do
            [ -e "$apk" ] || continue
            APP_NAME=$(echo "$apk" | sed -e 's/merged_//' -e 's/\.apk//')
            OUT_DIR="decoded/$APP_NAME"
            java -jar APKEditor.jar d -i "$apk" -o "$OUT_DIR"
          done
          python3 -c "
          import json, os, glob
          apps = [d for d in os.listdir('decoded') if os.path.isdir(os.path.join('decoded', d))]
          index = {'apps': {}}
          for app in apps:
              layout_path = os.path.join('decoded', app, 'res', 'layout', '*.xml')
              files = glob.glob(layout_path)
              index['apps'][app] = [os.path.basename(f) for f in files]
          with open('decoded/index.json', 'w') as f:
              json.dump(index, f, indent=2)
          "
      - uses: actions/upload-artifact@v4
        with:
          name: resources
          path: decoded/
          retention-days: 1

  # 5. Logic部隊（権限修正済み）
  decompile-logic:
    needs: merge-apk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # 補給戦術を変更：バイナリに実行権限を与える！
      - name: Install JADX
        run: |
          echo ">> Downloading JADX v1.5.5..."
          curl -L https://github.com/skylot/jadx/releases/download/v1.5.5/jadx-1.5.5.zip -o jadx.zip
          unzip -q jadx.zip -d jadx
          
          # 💡 ここが重要！実行権限を付与する
          chmod +x jadx/bin/jadx
          
          # パスを通す
          echo "$PWD/jadx/bin" >> $GITHUB_PATH
      
      - uses: actions/download-artifact@v4
        with:
          name: merged-apk
          
      - name: Verify JADX
        run: jadx --version
        
      - name: Run Build Script
        run: |
          chmod +x build.sh
          ./build.sh
          
      - uses: actions/upload-artifact@v4
        with:
          name: logic-js
          path: output_js/
          retention-days: 1

  # 6. 集約部隊
  sync-to-repo:
    needs: [analyze-native, extract-resources, decompile-logic]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
      - name: Commit Reports
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action [XML-Integrator-Bot]"
          mkdir -p reports/logic reports/native reports/resources
          cp -r logic-js/* reports/logic/ 2>/dev/null || true
          cp -r native-report/* reports/native/ 2>/dev/null || true
          cp -r resources/* reports/resources/ 2>/dev/null || true
          git add reports/
          if ! git diff-index --quiet HEAD --; then
            git commit -m "Update Analysis Reports and JS Logic"
            git push
          else
            echo "No changes to commit."
          fi
