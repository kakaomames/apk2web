name: APK2Web Pipeline

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  # 1. 掃除部隊：過去の遺産を整理する
  cleanup-artifacts:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Purge Old Artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo ">> Starting cleanup..."
          ARTIFACTS=$(gh api repos/:owner/:repo/actions/artifacts -q '.artifacts[].id')
          for id in $ARTIFACTS; do
            echo "Deleting artifact $id..."
            gh api repos/:owner/:repo/actions/artifacts/$id -X DELETE
          done
          echo ">> Cleanup complete!"

  # 2. マージ部隊：APKSを統合してAPKへ
  merge-apk:
    needs: cleanup-artifacts
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download .apks from Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p assets
          gh release download --pattern "*.apks" --dir ./assets/ --clobber
      - name: Setup & Merge
        run: |
          curl -f -L "https://github.com/REAndroid/APKEditor/releases/download/V1.4.9/APKEditor-1.4.9.jar" -o APKEditor.jar
          mkdir -p output
          targets=("com.mojang.minecraftpe_1.26.23.1.apks" "pokemon.apks")
          for target in "${targets[@]}"; do
             file="assets/$target"
             if [ -f "$file" ]; then
               echo ">> Target acquired: $file. Merging..."
               java -jar APKEditor.jar m -i "$file" -o "output/merged_$(basename "$file" .apks).apk"
             fi
          done
      - uses: actions/upload-artifact@v4
        with:
          name: merged-apk
          path: output/*.apk
          retention-days: 1

  # 3. Native部隊：SOファイル解析
  analyze-native:
    needs: merge-apk
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: merged-apk
      - name: Analyze .so files
        run: |
          mkdir -p native-report
          for apk in *.apk; do
            [ -e "$apk" ] || continue
            unzip -q "$apk" -d "extracted/$apk"
            echo "--- Report for $apk ---" >> native-report/native_report.txt
            find "extracted/$apk" -name "*.so" | while read -r so; do
              echo "FILE: $so" >> native-report/native_report.txt
              nm -D "$so" >> native-report/native_report.txt 2>/dev/null
            done
          done
      - uses: actions/upload-artifact@v4
        with:
          name: native-report
          path: native-report/
          retention-days: 1

  # 4. Resource部隊：XML -> JSONインデックス化
  extract-resources:
    needs: merge-apk
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: merged-apk
      - name: Prepare APKEditor
        run: |
          curl -f -L "https://github.com/REAndroid/APKEditor/releases/download/V1.4.9/APKEditor-1.4.9.jar" -o APKEditor.jar
      - name: Extract & Index
        run: |
          mkdir -p decoded
          for apk in merged_*.apk; do
            [ -e "$apk" ] || continue
            APP_NAME=$(echo "$apk" | sed -e 's/merged_//' -e 's/\.apk//')
            OUT_DIR="decoded/$APP_NAME"
            java -jar APKEditor.jar d -i "$apk" -o "$OUT_DIR"
          done
          python3 -c "
import json, os, glob
apps = [d for d in os.listdir('decoded') if os.path.isdir(os.path.join('decoded', d))]
index = {'apps': {}}
for app in apps:
    layout_path = os.path.join('decoded', app, 'res', 'layout', '*.xml')
    files = glob.glob(layout_path)
    index['apps'][app] = [os.path.basename(f) for f in files]
with open('decoded/index.json', 'w') as f:
    json.dump(index, f, indent=2)
"
      - uses: actions/upload-artifact@v4
        with:
          name: resources
          path: decoded/
          retention-days: 1

  # 5. Logic部隊：DEX -> JS変換
  decompile-logic:
    needs: merge-apk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y jadx
      - uses: actions/download-artifact@v4
        with:
          name: merged-apk
      - name: Run Build Script
        run: |
          chmod +x build.sh
          ./build.sh
      - uses: actions/upload-artifact@v4
        with:
          name: logic-js
          path: output_js/
          retention-days: 1

  # 6. 集約部隊：全てをリポジトリへ同期
  sync-to-repo:
    needs: [analyze-native, extract-resources, decompile-logic]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
      - name: Commit Reports
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action [XML-Integrator-Bot]"
          
          # 各ディレクトリを作成
          mkdir -p reports/logic reports/native reports/resources
          
          # 各Artifactから展開されたディレクトリをreports配下へコピー
          # それぞれのジョブで出力されたArtifact名と一致させる
          cp -r logic-js/* reports/logic/ 2>/dev/null || true
          cp -r native-report/* reports/native/ 2>/dev/null || true
          cp -r resources/* reports/resources/ 2>/dev/null || true
          
          git add reports/
          
          if ! git diff-index --quiet HEAD --; then
            git commit -m "Update Analysis Reports and JS Logic"
            git push
          else
            echo "No changes to commit."
          fi
